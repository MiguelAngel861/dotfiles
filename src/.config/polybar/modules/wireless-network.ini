[module/wireless-network]
type = internal/network
interface = wlan0
interface-type = wireless
interval = 5.0
unknown-as-up = true

; Conectado
format-connected = %{A1:kitty impala &:}<ramp-signal> <label-connected>%{A}
format-connected-foreground = ${colors.foreground}
label-connected = %essid%

; Desconectado
format-disconnected = <label-disconnected>
format-disconnected-foreground = ${colors.disabled}
label-disconnected = %{A1:kitty impala &:}󰤭 Desconectado%{A}

; Iconos de señal (con color según intensidad)
ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨

ramp-signal-foreground = ${colors.primary}
ramp-signal-padding-right = 1