
[module/arch]
type = custom/text

; Icono oficial de Arch Linux (requiere Nerd Font)
content = ""

; Estilo visual (cálido y elegante como tu tema)
content-font = 3                   ; Usa tu fuente de iconos (Nerd Font)
content-foreground = ${colors.primary}   ; Naranja dorado #ffbf00
content-background = ${colors.background}

content-padding-right = 2

; Acción al hacer click (puedes cambiarla)
click-left = rofi -show drun &
click-right = kitty

; Tooltip (texto que aparece al pasar el mouse)
content-tooltip = "Arch Linux"