[module/power-menu]
type = custom/text

; Icono grande y visible
content = 

; Estilo visual (igual que tu tema cálido)
content-font = 3
content-foreground = #ffbf00
content-padding = 1

; Hover effect (opcional pero se ve bonito)
content-overline = ${colors.primary}
content-overline-size = 1

; Acción al hacer click
click-left = ~/.config/rofi/scripts/powermenu.sh &

; Padding extra para que se vea equilibrado
format-padding = 1